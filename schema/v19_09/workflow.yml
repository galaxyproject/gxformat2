saladVersion: v1.1
$base: "https://galaxyproject.org/gxformat2/v19_09#"

$namespaces:
  gxformat2: "https://galaxyproject.org/gxformat2/v19_09#"
  gxformat2common: "https://galaxyproject.org/gxformat2/gxformat2common#"
  cwl: "https://w3id.org/cwl/cwl#"
  sld: "https://w3id.org/cwl/salad#"
  rdfs: "http://www.w3.org/2000/01/rdf-schema#"
  pydantic: "https://galaxyproject.org/gxformat2/pydantic#"

$graph:
- name: "WorkflowDoc"
  type: documentation
  doc:
    - |
      # Galaxy Workflow Format 2 Description

      The traditional Galaxy workflow description (.ga) is not meant to be concise and is neither readily human readable or human writable.
      Format 2 addresses all three of these limitations while also converging (where it makes sense without sacrificing these other goals)
      with the workflow description with that used by the Common Workflow Language.

      This standard is in active development and a moving target in many ways, but we will try to keep what is ingestible by Galaxy
      backward-compatible going forward.

- $import: "../common/metaschema/metaschema_base.yml"
- $import: "./Process.yml"  # trimmed down version of cwl's Process.yml
- $import: "../common/common.yml"

- name: GalaxyType
  type: enum
  extends: sld:PrimitiveType
  symbols:
    - integer
    - text
    - File
    - data
    - collection
  doc:
    - "Extends primitive types with the native Galaxy concepts such as datasets and collections."
    - "Normalized gxformat2 workflow input declaration spellings are ``data``, ``collection``, ``string``, ``int``, ``float``, and ``boolean``. Other spellings are accepted as compatibility aliases on import but normalized gxformat2 output emits the normalized spellings."
    - "data: one Galaxy dataset input. Native Galaxy ``data_input`` converts to this spelling."
    - "File: accepted alias for ``data``, but normalized gxformat2 output emits ``data``. Note: workflow **test job** YAML uses ``type: File`` to mean 'stage this file as test input data', which is a separate concept from workflow input declaration."
    - "collection: one Galaxy dataset collection input. Native Galaxy ``data_collection_input`` converts to this spelling."
    - "string: normalized gxformat2 spelling for native Galaxy text workflow parameters."
    - "text: accepted alias for ``string`` because native Galaxy parameter state and Galaxy tool XML terminology use ``text``."
    - "int: normalized gxformat2 spelling for native Galaxy integer workflow parameters."
    - "integer: accepted alias for ``int`` because native Galaxy parameter state and Galaxy tool XML terminology use ``integer``."


- name: WorkflowStepType
  type: enum
  symbols:
    - tool
    - subworkflow
    - pause
    - pick_value
  doc:
    - |
        Module types used by Galaxy steps. Galaxy's native format allows additional types such as data_input, data_input_collection, and parameter_type
        but these should be represented as ``inputs`` in Format2.
    - "tool: Run a tool."
    - "subworkflow: Run a subworkflow."
    - "pause: Pause computation on this branch of workflow until user allows it to continue."
    - "pick_value: Select the first non-null value from multiple inputs. Used to merge branches of conditional or optional workflow paths."

- name: BaseInputParameter
  type: record
  extends:
    - cwl:InputParameter
    - gxformat2common:HasStepPosition
  fields:
    - name: optional
      type:
      - boolean
      - "null"
      default: false
      doc: |
        Controls whether Galaxy allows invocation of the workflow without a
        user-supplied value for this input. If ``true``, the input may be omitted
        at invocation time. ``optional`` and ``default`` are independent: a
        required input (``optional: false``) may still declare a ``default``,
        and an optional input may have no ``default``. ``default`` supplies a
        value when the invocation input is missing or ``null``; ``optional``
        controls whether the missing case is even permitted.

- name: BaseDataParameter
  type: record
  extends: [BaseInputParameter]
  fields:
    - name: format
      doc: |
        Specify datatype extensions for valid input datasets.
      type:
        - "null"
        - type: array
          items: string

- name: WorkflowDataParameter
  type: record
  extends:
    - BaseDataParameter
  docParent: "#GalaxyWorkflow"
  doc: |
    A data input parameter for a Galaxy workflow. Represents one Galaxy dataset.
    Normalized gxformat2 output uses ``type: data``. ``type: File`` is accepted as
    an alias, but should not be confused with workflow test job syntax where
    ``type: File`` means stage a file as test input data.
  fields:
    - name: type
      type:
        - string
        - "null"
      default: data
      pydantic:type: 'Literal["data", "File"] | None'
      jsonldPredicate:
        "_id": "sld:type"
        "_type": "@vocab"
        refScope: 2
        typeDSL: True
      doc: |
        Specify valid types of data that may be assigned to this parameter.

- name: WorkflowCollectionParameter
  type: record
  extends:
    - BaseDataParameter
  docParent: "#GalaxyWorkflow"
  doc: |
    A collection input parameter for a Galaxy workflow - represents a dataset collection.
  fields:
    - name: type
      type: string
      pydantic:type: 'Literal["collection"]'
      jsonldPredicate:
        "_id": "sld:type"
        "_type": "@vocab"
        refScope: 2
        typeDSL: True
      doc: |
        Must be ``collection``.
    - name: collection_type
      doc: |
        Collection type (defaults to `list` if `type` is `collection`). Nested
        collection types are separated with colons, e.g. `list:list:paired`.
      type:
        - "null"
        - string
      jsonldPredicate:
        _id: "gxformat2:collection_type"
        noLinkCheck: true
    - name: column_definitions
      doc: |
        Column schema for sample-sheet collection inputs. Only meaningful when
        `collection_type` begins with `sample_sheet` - cross-field validation is
        applied in the pydantic post-validator.
      type:
        - "null"
        - type: array
          items: gxformat2common:SampleSheetColumnDefinition
      jsonldPredicate: "gxformat2:column_definitions"
    - name: fields
      doc: |
        Field schema for `record` collection inputs. Only meaningful when
        `collection_type` contains `record` (e.g. `record`, `list:record`,
        `sample_sheet:record`).
      type:
        - "null"
        - type: array
          items: gxformat2common:RecordFieldDefinition
      jsonldPredicate:
        _id: "sld:fields"
        mapSubject: name
        mapPredicate: type

- name: MinMax
  type: record
  fields:
    - name: min
      type:
        - int
        - float
        - "null"
      jsonldPredicate:
        _id: "gxformat2:MinMax/min"
        noLinkCheck: true
      doc: |
        Minimum allowed value (inclusive).
    - name: max
      type:
        - int
        - float
        - "null"
      jsonldPredicate:
        _id: "gxformat2:MinMax/max"
        noLinkCheck: true
      doc: |
        Maximum allowed value (inclusive).

- name: WorkflowIntegerParameter
  type: record
  extends:
    - BaseInputParameter
    - MinMax
  docParent: "#GalaxyWorkflow"
  doc: |
    A scalar integer workflow parameter. Normalized gxformat2 output uses
    ``type: int``. ``type: integer`` is accepted for compatibility with native
    Galaxy parameter state and Galaxy tool XML terminology.
  fields:
    - name: type
      type: string
      pydantic:type: 'Literal["integer", "int"]'
      jsonldPredicate:
        "_id": "sld:type"
        "_type": "@vocab"
        refScope: 2
        typeDSL: True
      doc: |
        Must be ``integer`` or ``int``.

- name: WorkflowFloatParameter
  type: record
  extends:
    - BaseInputParameter
    - MinMax
  docParent: "#GalaxyWorkflow"
  doc: |
    A float input parameter for a Galaxy workflow.
  fields:
    - name: type
      type: string
      pydantic:type: 'Literal["float"]'
      jsonldPredicate:
        "_id": "sld:type"
        "_type": "@vocab"
        refScope: 2
        typeDSL: True
      doc: |
        Must be ``float``.

- name: WorkflowTextParameter
  type: record
  extends:
    - BaseInputParameter
  docParent: "#GalaxyWorkflow"
  doc: |
    A scalar text workflow parameter. Normalized gxformat2 output uses
    ``type: string``. ``type: text`` is accepted for compatibility with native
    Galaxy parameter state and Galaxy tool XML terminology.
  fields:
    - name: type
      type: string
      pydantic:type: 'Literal["text", "string"]'
      jsonldPredicate:
        "_id": "sld:type"
        "_type": "@vocab"
        refScope: 2
        typeDSL: True
      doc: |
        Must be ``text`` or ``string``.
    - name: restrictions
      type:
        - "null"
        - type: array
          items:
            - string
            - gxformat2common:WorkflowTextOption
      jsonldPredicate: "gxformat2common:restrictions"
      doc: |
        Closed set of permitted values. When present, Galaxy renders the
        runtime input as a select. Items may be plain strings or
        `{value, label}` records.
    - name: suggestions
      type:
        - "null"
        - type: array
          items:
            - string
            - gxformat2common:WorkflowTextOption
      jsonldPredicate: "gxformat2common:suggestions"
      doc: |
        Open suggestion list. Galaxy still treats the input as text but
        offers these as suggestions.
    - name: restrictOnConnections
      type: boolean?
      jsonldPredicate: "gxformat2:restrictOnConnections"
      doc: |
        Ask Galaxy to derive valid choices from connected tool or
        subworkflow select inputs at runtime. Falls back to free text when
        derivation fails.

- name: WorkflowBooleanParameter
  type: record
  extends:
    - BaseInputParameter
  docParent: "#GalaxyWorkflow"
  doc: |
    A boolean input parameter for a Galaxy workflow.
  fields:
    - name: type
      type: string
      pydantic:type: 'Literal["boolean"]'
      jsonldPredicate:
        "_id": "sld:type"
        "_type": "@vocab"
        refScope: 2
        typeDSL: True
      doc: |
        Must be ``boolean``.

- name: WorkflowInputParameter
  type: record
  extends:
    - BaseDataParameter
    - MinMax
  docParent: "#GalaxyWorkflow"
  doc: |
    An input parameter to a Galaxy workflow. This is the catch-all type used
    by the Schema Salad codegen. The pydantic layer uses a discriminated union
    of the specific parameter types instead.
  fields:
    - name: type
      type:
      - GalaxyType
      - "null"
      - type: array
        items:
          - GalaxyType
      default: data
      jsonldPredicate:
        "_id": "sld:type"
        "_type": "@vocab"
        refScope: 2
        typeDSL: True
      doc: |
        Specify valid types of data that may be assigned to this parameter.
    - name: collection_type
      doc: |
        Collection type (defaults to `list` if `type` is `collection`). Nested
        collection types are separated with colons, e.g. `list:list:paired`.
      type:
        - "null"
        - string
      jsonldPredicate:
        _id: "gxformat2:collection_type"
        noLinkCheck: true
    - name: column_definitions
      doc: |
        Column schema for sample-sheet collection inputs. Only meaningful when
        `collection_type` begins with `sample_sheet`.
      type:
        - "null"
        - type: array
          items: gxformat2common:SampleSheetColumnDefinition
      jsonldPredicate: "gxformat2:column_definitions"
    - name: fields
      doc: |
        Field schema for `record` collection inputs. Only meaningful when
        `collection_type` contains `record`.
      type:
        - "null"
        - type: array
          items: gxformat2common:RecordFieldDefinition
      jsonldPredicate:
        _id: "sld:fields"
        mapSubject: name
        mapPredicate: type
    - name: restrictions
      type:
        - "null"
        - type: array
          items:
            - string
            - gxformat2common:WorkflowTextOption
      jsonldPredicate: "gxformat2common:restrictions"
      doc: |
        Closed set of permitted values for text-typed inputs. See
        `WorkflowTextParameter.restrictions`.
    - name: suggestions
      type:
        - "null"
        - type: array
          items:
            - string
            - gxformat2common:WorkflowTextOption
      jsonldPredicate: "gxformat2common:suggestions"
      doc: |
        Open suggestion list for text-typed inputs.
    - name: restrictOnConnections
      type: boolean?
      jsonldPredicate: "gxformat2:restrictOnConnections"
      doc: |
        For text-typed inputs - derive runtime choices from connected
        tool/subworkflow select inputs.

- name: WorkflowOutputParameter
  type: record
  extends: cwl:OutputParameter
  docParent: "#GalaxyWorkflow"
  doc: |
    Describe an output parameter of a workflow.  The parameter must be
    connected to one parameter defined in the workflow that
    will provide the value of the output parameter. It is legal to
    connect a WorkflowInputParameter to a WorkflowOutputParameter.
  fields:
    - name: outputSource
      doc: |
        Specifies workflow parameter that supply the value of to
        the output parameter.
      # Steps don't reference outputs in gxformat2 (yet anyway).
      # Can we just link the step if before the /
      #jsonldPredicate:
      #  "_id": "gxformat2:outputSource"
      #  "_type": "@id"
      #  refScope: 0
      type:
        - string?
    - name: type
      type: GalaxyType?
      default: data
      jsonldPredicate:
        "_id": "sld:type"
        "_type": "@vocab"
        refScope: 2
        typeDSL: True
      doc: |
        Specify valid types of data that may be assigned to this parameter.

- name: WorkflowStep
  type: record
  extends:
    - cwl:Identified
    - cwl:Labeled
    - sld:Documented
    - gxformat2common:HasStepPosition
    - gxformat2common:ReferencesTool
    - gxformat2common:HasStepErrors
    - gxformat2common:HasUUID
  docParent: "#GalaxyWorkflow"
  doc: |
    This represents a non-input step a Galaxy Workflow.

    # A note about `state` and `tool_state` fields.

    Only one or the other should be specified. These are two ways to represent the "state"
    of a tool at this workflow step. Both are essentially maps from parameter names to
    parameter values.

    `tool_state` is much more low-level and expects a flat dictionary with each value a JSON
    dump. Nested tool structures such as conditionals and repeats should have all their values
    in the JSON dumped string. In general `tool_state` may be present in workflows exported from
    Galaxy but shouldn't be written by humans.

    `state` can contained a typed map. Repeat values can be represented as YAML arrays. An alternative
    to representing `state` this way is defining inputs with default values.
  fields:
    - name: in
      type:  WorkflowStepInput[]?
      pydantic:type: "list[WorkflowStepInput] | dict[str, WorkflowStepInput | str | list[str]] | None"
      jsonldPredicate:
        _id: "gxformat2:in"
        mapSubject: id
        mapPredicate: source
      doc: |
        Defines the input parameters of the workflow step.  The process is ready to
        run when all required input parameters are associated with concrete
        values.  Input parameters include a schema for each parameter which is
        used to validate the input object.  It may also be used build a user
        interface for constructing the input object.
    - name: out
      type:
        - type: array
          items: [string, WorkflowStepOutput]
        - "null"
      pydantic:type: "list[WorkflowStepOutput | str] | dict[str, WorkflowStepOutput | str] | None"
      jsonldPredicate:
        _id: "gxformat2:out"
        mapSubject: id
        mapPredicate: source
      doc: |
        Defines the parameters representing the output of the process.  May be
        used to generate and/or validate the output object.

        This can also be called 'outputs' for legacy reasons - but the resulting
        workflow document is not a valid instance of this schema.
    - name: state
      type: Any?
      pydantic:type: "dict[str, Any] | None"
      doc: |
        Structured tool state.
      jsonldPredicate:
        _id: "gxformat2:state"
        noLinkCheck: true
    - name: tool_state
      type: Any?
      pydantic:type: "str | dict[str, Any] | None"
      jsonldPredicate:
        _id: "gxformat2:tool_state"
        noLinkCheck: true
      doc: |
        Unstructured tool state.
    - name: post_job_actions
      type: Any?
      pydantic:type: "dict[str, Any] | None"
      jsonldPredicate:
        _id: "gxformat2:post_job_actions"
        noLinkCheck: true
      doc: |
        Optional dict of post-job actions keyed by ``{ActionType}{OutputName}``
        compound strings.  Same shape as the native ``post_job_actions`` field;
        each value is a record with ``action_type``, ``output_name``,
        ``action_arguments``.  Use the ``out:`` shorthand (``rename:``,
        ``hide:``, ``change_datatype:``, etc.) for common actions; this
        explicit form covers actions without an ``out:`` shorthand
        (``ValidateOutputsAction``, etc.) and any case where the typed
        record is preferred.
    - name: type
      type: WorkflowStepType?
      jsonldPredicate:
        "_id": "sld:type"
        "_type": "@vocab"
        refScope: 2
        typeDSL: True
      default: tool
      doc: |
        Workflow step module's type (defaults to 'tool').
    - name: run
      type: Any?
      pydantic:type: "GalaxyWorkflow | str | dict[str, Any] | None"
      jsonldPredicate:
        _id: "cwl:run"
        _type: "@id"
        subscope: run
      doc: |
        Specifies a subworkflow to run. May be an inline workflow definition,
        a URL string, or an @import reference dict.
    - name: runtime_inputs
      type:
        - "null"
        - type: array
          items: string
    - name: when
      type:
        - "null"
        - string  # TODO: cwl defines an enum for this, not sure how that works
      jsonldPredicate:
        _id: "gxformat2:when"
        noLinkCheck: true
      doc: |
        If defined, only run the step when the expression evaluates to
        `true`.  If `false` the step is skipped.  A skipped step
        produces a `null` on each output.

        Expression should be an ecma5.1 expression.

- name: Sink
  type: record
  abstract: true
  fields:
    - name: source
      doc: |
        Specifies one or more workflow parameters that will provide input to
        the underlying step parameter.
      jsonldPredicate:
        "_id": "cwl:source"
        "_type": "@id"
        refScope: 2
      type:
        - string?
        - string[]?

- type: record
  name: WorkflowStepInput
  extends: [cwl:Identified, Sink, cwl:Labeled]
  docParent: "#WorkflowStep"
  doc: |
    TODO:

  fields:
    - name: default
      type: ["null", Any]
      doc: |
        The default value for this parameter to use if either there is no
        `source` field, or the value produced by the `source` is `null`.  The
        default must be applied prior to scattering or evaluating `valueFrom`.
      jsonldPredicate:
        _id: "sld:default"
        noLinkCheck: true

- type: record
  name: Report
  doc: |
    Definition of an invocation report for this workflow. Currently the only
    field is 'markdown'.
  fields:
    - name: markdown
      type: string
      doc: |
        Galaxy flavored Markdown to define an invocation report.

- type: record
  name: WorkflowStepOutput
  docParent: "#WorkflowStep"
  extends: cwl:Identified
  doc: |
    Associate an output parameter of the underlying process with a workflow
    parameter.  The workflow parameter (given in the `id` field) be may be used
    as a `source` to connect with input parameters of other workflow steps, or
    with an output parameter of the process.

    A unique identifier for this workflow output parameter.  This is
    the identifier to use in the `source` field of `WorkflowStepInput`
    to connect the output value to downstream parameters.
  fields:
    rename:
      type: string?
    hide:
      type: boolean?
    delete_intermediate_datasets:
      type: boolean?
    change_datatype:
      type: string?
    set_columns:
      type: Any?
      pydantic:type: "dict[str, Any] | None"
    add_tags:
      type:
        - "null"
        - type: array
          items: string
    remove_tags:
      type:
        - "null"
        - type: array
          items: string

# --- Comment type discriminators ---

# Comment type discriminators use string with pydantic:type Literal
# instead of enums to avoid JSON-LD predicate collisions with GalaxyType symbols.

# --- Comment base and types ---

- name: BaseComment
  type: record
  abstract: true
  doc: |
    Base fields shared by all comment types.
  fields:
    - name: position
      type: Any?
      pydantic:type: "list[float] | None"
      jsonldPredicate: "https://galaxyproject.org/gxformat2/gxformat2common#HasStepPosition/position"
      doc: |
        Position of the comment on the editor canvas as ``[x, y]`` coordinates.
    - name: size
      type: Any?
      pydantic:type: "list[float] | None"
      doc: |
        Size of the comment as ``[width, height]``.
    - name: color
      type: string?
      doc: |
        Display color of the comment (e.g. ``"none"``, ``"blue"``).
    - name: label
      type: string?
      jsonldPredicate: "rdfs:label"
      doc: |
        Optional label for referencing this comment from frame ``contains_comments``
        fields or for use as a map key when comments are represented as a mapping.

- name: TextComment
  type: record
  extends: BaseComment
  doc: |
    A plain text annotation in the workflow editor.
  fields:
    - name: type
      type: string
      pydantic:type: 'Literal["text"]'
      jsonldPredicate:
        "_id": "sld:type"
        "_type": "@vocab"
        refScope: 2
        typeDSL: True
      doc: |
        Comment type (``text``).
    - name: text
      type: string?
      jsonldPredicate: "https://galaxyproject.org/gxformat2/v19_09#GalaxyType/text"
      doc: |
        The text content.
    - name: bold
      type: boolean?
      doc: |
        Whether the text is displayed in bold.
    - name: italic
      type: boolean?
      doc: |
        Whether the text is displayed in italic.
    - name: text_size
      type:
        - "null"
        - float
        - int
      doc: |
        Font size of the text.

- name: MarkdownComment
  type: record
  extends: BaseComment
  doc: |
    A Markdown-rendered annotation in the workflow editor.
  fields:
    - name: type
      type: string
      pydantic:type: 'Literal["markdown"]'
      jsonldPredicate:
        "_id": "sld:type"
        "_type": "@vocab"
        refScope: 2
        typeDSL: True
      doc: |
        Comment type (``markdown``).
    - name: text
      type: string?
      jsonldPredicate: "https://galaxyproject.org/gxformat2/v19_09#GalaxyType/text"
      doc: |
        Markdown content.

- name: FrameComment
  type: record
  extends: BaseComment
  doc: |
    A rectangular grouping box that visually contains steps and other comments.
  fields:
    - name: type
      type: string
      pydantic:type: 'Literal["frame"]'
      jsonldPredicate:
        "_id": "sld:type"
        "_type": "@vocab"
        refScope: 2
        typeDSL: True
      doc: |
        Comment type (``frame``).
    - name: title
      type: string?
      doc: |
        Title displayed on the frame header.
    - name: contains_steps
      type:
        - "null"
        - type: array
          items:
            - string
            - int
      jsonldPredicate:
        _id: "gxformat2:contains_steps"
        noLinkCheck: true
      doc: |
        Step labels or indices contained within this frame.
    - name: contains_comments
      type:
        - "null"
        - type: array
          items:
            - string
            - int
      jsonldPredicate:
        _id: "gxformat2:contains_comments"
        noLinkCheck: true
      doc: |
        Comment labels or indices contained within this frame.

- name: FreehandComment
  type: record
  extends: BaseComment
  doc: |
    A freehand drawn line on the editor canvas.
  fields:
    - name: type
      type: string
      pydantic:type: 'Literal["freehand"]'
      jsonldPredicate:
        "_id": "sld:type"
        "_type": "@vocab"
        refScope: 2
        typeDSL: True
      doc: |
        Comment type (``freehand``).
    - name: thickness
      type:
        - "null"
        - float
        - int
      doc: |
        Line thickness.
    - name: line
      type: Any?
      pydantic:type: "list[list[float]] | None"
      jsonldPredicate:
        _id: "gxformat2:line"
        noLinkCheck: true
      doc: |
        Array of ``[x, y]`` coordinate pairs defining the freehand line path.

- name: WorkflowComment
  type: union
  names:
    - TextComment
    - MarkdownComment
    - FrameComment
    - FreehandComment
  doc: A visual annotation in the workflow editor, discriminated by type.

# --- Creator type discriminators ---

- name: CreatorPersonType
  type: enum
  symbols:
    - Person
  doc: "Discriminator for schema.org Person creators."

- name: CreatorOrganizationType
  type: enum
  symbols:
    - Organization
  doc: "Discriminator for schema.org Organization creators."

# --- Creator base and types ---

- name: BaseCreator
  type: record
  abstract: true
  doc: |
    Base fields shared by all creator types, corresponding to schema.org
    Thing properties common to both Person and Organization.
  fields:
    - name: name
      type: string?
      jsonldPredicate: "@id"
      doc: |
        Full name of the person or organization.
    - name: identifier
      type: string?
