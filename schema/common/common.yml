saladVersion: v1.1
$base: "https://galaxyproject.org/gxformat2/gxformat2common#"

$graph:

- name: HasUUID
  type: record
  abstract: true
  fields:
    - name: uuid
      type: string?
      doc: |
        UUID uniquely representing this element.

- name: HasStepErrors
  type: record
  abstract: true
  fields:
    - name: errors
      type: string?
      doc: |
        During Galaxy export there may be some problem validating the tool state, tool used, etc..
        that will be indicated by this field. The Galaxy user should be warned of these problems before
        the workflow can be used in Galaxy.

        This field should not be used in human written Galaxy workflow files.

        A typical problem is the referenced tool is not installed, this can be fixed by installed the tool
        and re-saving the workflow and then re-exporting it.

- name: HasStepPosition
  type: record
  abstract: true
  fields:
    - name: position
      type: StepPosition?

- name: StepPosition
  type: record
  doc: This field specifies the location of the step's node when rendered in the workflow editor.
  fields:
    - name: top
      type:
        - float
        - int
      default: 0.0
      doc: |
        Relative vertical position of the step's node when rendered in the workflow editor.
    - name: left
      type:
        - float
        - int
      default: 0.0
      doc: |
        Relative horizontal position of the step's node when rendered in the workflow editor.

- name: ReferencesTool
  type: record
  abstract: true
  fields:
    - name: tool_id
      type: string?
      doc: |
        The tool ID used to run this step of the workflow (e.g. 'cat1' or 'toolshed.g2.bx.psu.edu/repos/nml/collapse_collections/collapse_dataset/4.0').
    - name: tool_shed_repository
      type: ToolShedRepository?
      doc: |
        The Galaxy Tool Shed repository that should be installed in order to use this tool.
    - name: tool_version
      type: string?
      doc: |
        The tool version corresponding used to run this step of the workflow. For tool shed installed tools, the ID generally uniquely specifies a version
        and this field is optional.

- name: SampleSheetColumnDefinition
  type: record
  doc: |
    Describes one column of a sample-sheet collection input.
    Used in `column_definitions` on a `collection_type: sample_sheet[:<type>]`
    workflow input.
  fields:
    - name: name
      type: string
      jsonldPredicate: "@id"
      doc: |
        Column name. Must not contain special characters (matches
        `^[\w\-_ \?]*$`).
    - name: description
      type: string?
      jsonldPredicate: "https://galaxyproject.org/gxformat2/native_v0_1#NativeStepInput/description"
      doc: Optional human-readable column description.
    - name: type
      type: string
      pydantic:type: 'Literal["string", "int", "float", "boolean", "element_identifier"]'
      jsonldPredicate:
        "_id": "sld:type"
        "_type": "@vocab"
        refScope: 2
        typeDSL: True
      doc: |
        Value type for this column. One of `string`, `int`, `float`, `boolean`,
        or `element_identifier`. Mirrors Galaxy's runtime
        `SampleSheetColumnType`.
    - name: optional
      type: boolean
      jsonldPredicate: "https://galaxyproject.org/gxformat2/v19_09#BaseInputParameter/optional"
      doc: |
        If true, rows may omit a value for this column.
    - name: default_value
      type:
        - "null"
        - string
        - int
        - float
        - boolean
      jsonldPredicate: "gxformat2common:default_value"
      doc: |
        Default value used when a row omits this column. Type must be
        compatible with `type` - validated by the pydantic post-validator.
    - name: validators
      type:
        - "null"
        - type: array
          items: Any
      jsonldPredicate: "gxformat2common:validators"
      doc: |
        Galaxy-style parameter validators. Modelled as opaque records here -
        full validator schema lives in galaxy.tool_util_models.
    - name: restrictions
      type:
        - "null"
        - type: array
          items:
            - string
            - int
            - float
            - boolean
      jsonldPredicate: "gxformat2common:restrictions"
      doc: |
        Closed set of permitted values for this column. Item type must be
        compatible with the column `type` (post-validated).
    - name: suggestions
      type:
        - "null"
        - type: array
          items:
            - string
            - int
            - float
            - boolean
      jsonldPredicate: "gxformat2common:suggestions"
      doc: |
        Open suggestion list for this column.

- name: RecordFieldDefinition
  type: record
  doc: |
    Describes one field of a `record` collection input.
    Used in `fields` on a `collection_type` containing `record` (e.g.
    `record`, `list:record`, `sample_sheet:record`). Mirrors a subset of
    the CWL `InputRecordSchema` shape that Galaxy persists on
    `DatasetCollection.fields`.
  fields:
    - name: name
      type: string
      jsonldPredicate: "@id"
      doc: |
        Field name. Must equal the corresponding element identifier in
        the materialized record collection.
    - name: type
      type:
        - string
        - type: array
          items: string
      pydantic:type: 'Literal["File", "null", "boolean", "int", "float", "string"] | list[Literal["File", "null", "boolean", "int", "float", "string"]]'
      jsonldPredicate:
        "_id": "sld:type"
        "_type": "@vocab"
        refScope: 2
        typeDSL: True
      doc: |
        Field value type. A subset of the CWL primitive types: `File`,
        `null`, `boolean`, `int`, `float`, `string`. May be a list to
        express a union (e.g. `["File", "null"]` for an optional file).
    - name: format
      type: string?
      jsonldPredicate: "https://galaxyproject.org/gxformat2/v19_09#BaseDataParameter/format"
      doc: |
        Optional Galaxy datatype hint for `File`-typed fields.

- name: WorkflowTextOption
  type: record
  doc: |
    A `{value, label}` option used in `restrictions` or `suggestions` on a
    text workflow parameter. Plain strings are also accepted in those
    arrays as shorthand for `{value: <str>, label: <str>}`.
  fields:
    - name: value
      type: string
      jsonldPredicate:
        _id: "gxformat2common:WorkflowTextOption/value"
        noLinkCheck: true
      doc: Machine value submitted to the connected tool input.
    - name: label
      type: string?
      jsonldPredicate: "rdfs:label"
      doc: |
        Human label shown in Galaxy. Defaults to `value` when omitted.

- name: ToolShedRepository
  type: record
  fields:
    - name: changeset_revision
      type: string
      doc: |
        The revision of the tool shed repository this tool can be found in.
    - name: name
      type: string
      jsonldPredicate: "@id"  #  will this bite me?
      doc: |
        The name of the tool shed repository this tool can be found in.
    - name: owner
      type: string
      doc: |
        The owner of the tool shed repository this tool can be found in.
    - name: tool_shed
      type: string
      doc: |
        The URI of the tool shed containing the repository this tool can be found in - typically this should be toolshed.g2.bx.psu.edu.
