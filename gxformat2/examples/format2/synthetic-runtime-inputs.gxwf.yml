class: GalaxyWorkflow
inputs:
  input1: data
outputs:
  out1:
    outputSource: random/out_file1
steps:
  the_pause:
    type: pause
    in:
      input: input1
  random:
    tool_id: random_lines1
    runtime_inputs:
      - num_lines
    state:
      input:
        $link: the_pause
      seed_source:
        seed_source_selector: set_seed
        seed: asdf
