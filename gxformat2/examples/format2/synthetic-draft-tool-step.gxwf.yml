    outputSource: fastp/TODO_trimmed_paired
steps:
  fastp:
    tool_id: TODO
    tool_version: TODO
    label: trim and QC paired reads
    in:
      TODO_input: reads
    out:
      - id: TODO_trimmed_paired
      - id: TODO_html_report
