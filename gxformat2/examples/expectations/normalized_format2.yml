test_simple_graph_extracts_main:
  fixture: synthetic-graph-simple.gxwf.yml
  operation: normalized_format2
  assertions:
    - path: [label]
      value: null
    - path: [inputs, $length]
      value: 1
    - path: [inputs, 0, id]
      value: the_input
    - path: [steps, $length]
      value: 1
    - path: [steps, 0, tool_id]
      value: cat1

test_graph_inlines_subworkflow_ref:
  fixture: synthetic-graph-with-subworkflow.gxwf.yml
  operation: normalized_format2
  assertions:
    - path: [steps, $length]
      value: 2
    - path: [steps, {id: nested_workflow}, run, inputs, $length]
      value: 1
    - path: [steps, {id: nested_workflow}, run, inputs, 0, id]
      value: inner_input
    - path: [steps, {id: nested_workflow}, run, steps, $length]
      value: 1
    - path: [steps, {id: nested_workflow}, run, steps, 0, tool_id]
      value: random_lines1

test_input_shorthand_expanded:
  fixture: synthetic-input-shorthand.gxwf.yml
