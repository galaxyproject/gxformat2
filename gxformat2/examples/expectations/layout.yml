    - roots_leftmost

layout_layered_crossing_format2:
  fixture: synthetic-crossing-reversed.gxwf.yml
  operation: layout_layered_format2
  graph_properties:
    - downstream_right_of_upstream
    - all_nodes_positioned
    - no_position_collisions
    - roots_leftmost

layout_layered_basic_native:
  fixture: real-basic-without-step-input-label.ga
  operation: layout_layered_native
  graph_properties:
    - downstream_right_of_upstream
    - all_nodes_positioned
    - no_position_collisions
    - roots_leftmost

# --- cycle policy -----------------------------------------------------------

# Cyclic workflows are invalid in Galaxy; the bake path must raise rather than
# emit meaningless positions.
layout_cycle_raises:
  fixture: synthetic-cycle.gxwf.yml
  operation: layout_format2
  expect_error: true

layout_layered_cycle_raises:
  fixture: synthetic-cycle.gxwf.yml
  operation: layout_layered_format2
  expect_error: true
