# Declarative tests for gxformat2.layout.apply_layout (overwrite=True), which
# replaces the degenerate diagonal layout with computed positions.
#
# These are the CROSS-LANGUAGE contract: instead of exact coordinates (which
# differ between the ``topological`` and ``layered`` strategies, and need not
# match across language ports), each case asserts named structural
# ``graph_properties``. A conforming reimplementation reimplements the
# checkers, not the coordinates. Exact-coordinate goldens are kept Python-local
# in tests/test_layout.py. Checkers live in gxformat2/layout/_properties.py.
#
# Properties:
#   downstream_right_of_upstream  every edge points strictly rightward
#   all_nodes_positioned          every node has a position
#   no_position_collisions        no two nodes share a coordinate
#   roots_leftmost                input/root nodes sit at the minimum left

# --- topological strategy ---------------------------------------------------

layout_basic_format2:
  fixture: synthetic-basic.gxwf.yml
  operation: layout_format2
  graph_properties:
    - downstream_right_of_upstream
    - all_nodes_positioned
    - no_position_collisions
    - roots_leftmost

