# Format2 workflow linting
# lint operations return {errors: [...], warnings: [...], error_count: N, warn_count: N}

test_lint_basic_clean:
  fixture: synthetic-basic.gxwf.yml
  operation: lint_format2
  assertions:
    - path: [error_count]
      value: 0
    - path: [warn_count]
      value: 0

