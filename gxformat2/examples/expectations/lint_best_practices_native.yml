# Native best practices linting
# lint_best_practices_native returns {errors: [...], warnings: [...], error_count: N, warn_count: N}

test_bp_native_no_annotation:
  fixture: synthetic-minimal-tool.ga
  operation: lint_best_practices_native
  assertions:
    - path: [error_count]
      value: 0
    - path: [warnings]
      value_any_contains: "not annotated"

test_bp_native_no_creator:
  fixture: synthetic-minimal-tool.ga
  operation: lint_best_practices_native
  assertions:
    - path: [warnings]
      value_any_contains: "creator"

