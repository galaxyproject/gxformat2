name: GitHub Actions Security Analysis (zizmor)
on:
  push:
    paths:
      - '.github/workflows/*'
      - zizmor.yml
  pull_request:
    paths:
      - '.github/workflows/*'
      - zizmor.yml
permissions: {}
jobs:
  zizmor:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: zizmorcore/zizmor-action@v0.5.6
