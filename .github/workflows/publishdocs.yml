name: Publish gxformat2 Docs
on: [push, pull_request]
concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true
permissions: {}
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        persist-credentials: false
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.13'
        cache: pip
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install -r requirements.txt -r dev-requirements.txt
    - name: Build docs
      run: |
        USE_VENV=0 SKIP_JAVA=1 SKIP_TYPESCRIPT=1 bash build_schema.sh
    - uses: actions/upload-artifact@v7
      with:
        name: schema
        path: dist/schema
  deploy:
    needs: [build]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && github.repository_owner == 'galaxyproject'
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v6 # zizmor: ignore[artipacked] deploy needs the persisted token to push to gh-pages
    - uses: actions/download-artifact@v8
      with:
        name: schema
        path: dist/schema
    - name: Deploy Docs
      uses: JamesIves/github-pages-deploy-action@releases/v4
      with:
        folder: dist/schema
