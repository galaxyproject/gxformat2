[mypy]
ignore_missing_imports = true

[nosetests]
verbosity=1
detailed-errors=1
with-doctest=1
with-coverage=1
logging-filter=gxformat2
logging-level=INFO

[flake8]
# E704: black formats overload stubs as single-line `def foo(): ...`
ignore = E203,E501,E704,W503
max-complexity = 30
exclude = gxformat2/markdown_parse.py,gxformat2/schema/v19_09.py,gxformat2/schema/native_v0_1.py,gxformat2/schema/gxformat2.py,gxformat2/schema/gxformat2_strict.py,gxformat2/schema/native.py,gxformat2/schema/native_strict.py,.venv,.venv3,.git,.tox,scripts,docs,build
